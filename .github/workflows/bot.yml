name: War Monitor Bot

on:
  schedule:
    - cron: '*/15 * * * *'  # ตั้งปลุกให้ทำงานทุกๆ 15 นาที
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser google-generativeai playwright nest_asyncio
          playwright install chromium
          
      - name: Run Bot
        run: python bot.py
